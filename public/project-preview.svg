<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#131318"/>
      <stop offset="1" stop-color="#0c0c0d"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- accent glows -->
  <circle cx="1100" cy="80"  r="260" fill="#7C5CFF" fill-opacity="0.10"/>
  <circle cx="100"  cy="580" r="300" fill="#00D4FF" fill-opacity="0.07"/>

  <!-- subtle grid lines -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#ffffff" stroke-opacity="0.03"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#ffffff" stroke-opacity="0.03"/>

  <!-- name -->
  <text
    x="600" y="262"
    text-anchor="middle"
    fill="#F0F0F4"
    font-family="Geist, 'Segoe UI', Arial, sans-serif"
    font-size="72"
    font-weight="600"
    letter-spacing="-1"
  >Wiktor Spryszyński</text>

  <!-- divider -->
  <rect x="536" y="286" width="128" height="1.5" rx="1" fill="#7C5CFF" fill-opacity="0.6"/>

  <!-- title -->
  <text
    x="600" y="342"
    text-anchor="middle"
    fill="#9090A8"
    font-family="Geist, 'Segoe UI', Arial, sans-serif"
    font-size="28"
    font-weight="400"
    letter-spacing="0.5"
  >Full-Stack Developer</text>

  <!-- url -->
  <text
    x="600" y="396"
    text-anchor="middle"
    fill="#5A5A70"
    font-family="'Geist Mono', 'Courier New', monospace"
    font-size="18"
    letter-spacing="1"
  >spryszynski.pl</text>
</svg>
