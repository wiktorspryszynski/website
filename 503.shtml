<!doctype html>
<html lang="pl">
  <head>
    <link rel="shortcut icon" href="https://seohost.pl/files/main/favicon.png" type=image/x-icon>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="503 Error - Service Unavailable">
    <title>503 Error | Błąd 503</title>
    <style>
      body {
        background: #000;
        color: #2db569;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        position: relative;
        display: flex;
        flex-direction: column;
      }

      body::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-image: url('https://default.seohost.pl/bg.svg');
        opacity: 0.6;
        z-index: -1;
      }

      main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        min-height: calc(100vh - 100px);
      }

      .container {
        width: 100%;
        max-width: 800px;
        text-align: center;
      }

      /* Główna ikona */
      .error-icon {
        margin-bottom: 3rem;
        animation: fadeIn 0.8s ease-out;
      }

      .error-icon svg {
        width: 100%;
        height: 400px;
        margin: 0 auto;
        display: block;
        animation: float 4s ease-in-out infinite;
        filter: drop-shadow(0 0 30px rgba(45, 181, 105, 0.4));
      }

      @keyframes float {
        0%, 100% { 
          transform: translateY(0px); 
        }
        50% { 
          transform: translateY(-20px); 
        }
      }

      /* Sekcja błędu */
      .error-section {
        margin-bottom: 4rem;
        animation: fadeInDown 0.8s ease-out 0.3s both;
      }

      @keyframes fadeInDown {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .error-title {
        font-size: 3rem;
        font-weight: 300;
        letter-spacing: 0.1em;
        margin: 0;
        padding: 1rem 2rem;
        display: inline-block;
        position: relative;
        color: #2db569;
        text-transform: uppercase;
      }

      /* Narożniki dla error title */
      .error-title::before,
      .error-title::after {
        content: '';
        position: absolute;
        width: 40px;
        height: 40px;
        border: 1px solid rgba(45, 181, 105, 0.3);
      }

      .error-title::before {
        top: 0;
        left: 0;
        border-right: none;
        border-bottom: none;
      }

      .error-title::after {
        bottom: 0;
        right: 0;
        border-left: none;
        border-top: none;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Sekcja powiadomienia */
      .error-notice {
        background: rgba(45, 181, 105, 0.02);
        border: 1px solid rgba(45, 181, 105, 0.08);
        border-radius: 12px;
        padding: 1.5rem 2rem;
        margin: 2rem auto;
        max-width: 600px;
        position: relative;
        animation: fadeInUp 0.8s ease-out 0.6s both;
        transition: all 0.3s ease;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .notice-content {
        display: flex;
        align-items: center;
        gap: 1rem;
        justify-content: center;
      }

      .notice-icon {
        flex-shrink: 0;
        color: rgba(45, 181, 105, 0.4);
      }

      .notice-icon svg {
        width: 18px;
        height: 18px;
      }

      .notice-text {
        margin: 0;
        color: rgba(45, 181, 105, 0.7);
        font-size: 0.95rem;
        line-height: 1.5;
      }

      /* Hover efekt */
      .error-notice:hover {
        background: rgba(45, 181, 105, 0.03);
        border-color: rgba(45, 181, 105, 0.12);
        transform: translateY(-2px);
      }

      .error-notice:hover .notice-icon {
        color: rgba(45, 181, 105, 0.6);
      }

      /* Footer */
      footer {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        text-align: center;
        padding: 1.5rem;
        z-index: 10;
      }

      .logo {
        max-width: 120px;
        height: auto;
        opacity: 0.7;
        transition: opacity 0.3s ease;
      }

      .logo:hover {
        opacity: 1;
      }

      /* Responsywność */
      @media (max-width: 768px) {
        .error-icon svg {
          width: 250px;
          height: 250px;
        }
        
        .error-title {
          font-size: 2rem;
        }
        
        .error-title::before,
        .error-title::after {
          width: 30px;
          height: 30px;
        }
        
        .error-notice {
          padding: 1.2rem 1.5rem;
        }
      }

      @media (max-width: 480px) {
        .error-icon svg {
          width: 180px;
          height: 180px;
        }
        
        .error-title {
          font-size: 1.5rem;
          letter-spacing: 0.05em;
        }
        
        .error-notice {
          margin: 1rem;
        }
        
        .notice-text {
          font-size: 0.9rem;
        }
      }
    </style>
  </head>
  <body>

        <!-- Kod błędu -->
        <div class="error-section">
          <h1 class="error-title">
            <span class="lang-pl">Błąd 503</span>
            <span class="lang-en" style="display:none;">Error 503</span>
          </h1>
        </div>
        
        <!-- Sekcja informacji -->
        <div class="error-notice">
          <div class="notice-content">
            <span class="notice-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>

                <circle cx="12" cy="16" r="1" fill="currentColor"/>
              </svg>
            </span>
            <p class="notice-text">
              <span class="lang-pl">Usługa niedostępna</span>
              <span class="lang-en" style="display:none;">Service unavailable</span>
            </p>
          </div>
        </div>

    </main>

    <footer>
      <a href="https://seohost.pl"><img src="https://default.seohost.pl/logo-white.png" alt="Seohost" class="logo" /></a>
    </footer>

    <script>
    // Automatyczne wykrywanie języka przeglądarki
    (function() {
      const userLang = navigator.language || navigator.userLanguage;
      const isPolish = userLang.toLowerCase().startsWith('pl');
      
      if (!isPolish) {
        document.querySelectorAll('.lang-pl').forEach(el => el.style.display = 'none');
        document.querySelectorAll('.lang-en').forEach(el => {
          if (el.tagName === 'SPAN') {
            el.style.display = 'inline';
          } else {
            el.style.display = 'block';
          }
        });
        document.documentElement.lang = 'en';
      }
    })();
    </script>
  </body>
</html>
